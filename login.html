<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartNest — Accedi</title>
  <link rel="stylesheet" href="styles/login.css">
</head>
<body>

  <!-- Background decorations -->
  <div class="bg-glow bg-glow--tl"></div>
  <div class="bg-glow bg-glow--br"></div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand -->
      <div class="login-brand">
        <div class="login-brand__logo">
          <svg viewBox="0 0 24 24" fill="#080b10" width="22" height="22">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="login-brand__text">
          <h1>Smart<span>Nest</span></h1>
          <p>Controllo Casa · v2.4.1</p>
        </div>
      </div>

      <!-- Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            class="form-input"
            type="email"
            id="email"
            name="email"
            placeholder="nome@smartnest.io"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-wrap">
            <input
              class="form-input"
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            >
            <span class="form-input-wrap__toggle" id="pwd-toggle" onclick="togglePassword()">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="form-footer">
          <label class="form-check">
            <input type="checkbox" id="remember" name="remember">
            <span class="form-check__label">Ricordami</span>
          </label>
          <span class="form-link">Password dimenticata?</span>
        </div>

        <!-- Error -->
        <div class="form-error" id="form-error">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="error-msg">Credenziali non valide.</span>
        </div>

        <button type="submit" class="btn-login" id="submit-btn">
          Accedi
        </button>

      </form>

      <!-- Divider -->
      <div class="login-divider" style="margin-top:20px">oppure accedi come demo</div>

      <!-- Demo accounts -->
      <div class="demo-accounts">
        <div class="demo-account" onclick="loginDemo('marco@smartnest.io')">
          <div class="demo-account__avatar" style="background:linear-gradient(135deg,#00d4b4,#0088aa)">MA</div>
          <div class="demo-account__info">
            <div class="demo-account__name">Marco Alberti</div>
            <div class="demo-account__role">admin · marco@smartnest.io</div>
          </div>
          <span class="demo-account__arrow">›</span>
        </div>
        <div class="demo-account" onclick="loginDemo('sara@smartnest.io')">
          <div class="demo-account__avatar" style="background:linear-gradient(135deg,#f0a030,#f04060)">SF</div>
          <div class="demo-account__info">
            <div class="demo-account__name">Sara Ferrari</div>
            <div class="demo-account__role">admin · sara@smartnest.io</div>
          </div>
          <span class="demo-account__arrow">›</span>
        </div>
        <div class="demo-account" onclick="loginDemo('giulia@smartnest.io')">
          <div class="demo-account__avatar" style="background:linear-gradient(135deg,#4a5878,#1a2130)">GB</div>
          <div class="demo-account__info">
            <div class="demo-account__name">Giulia Bianchi</div>
            <div class="demo-account__role">viewer · giulia@smartnest.io</div>
          </div>
          <span class="demo-account__arrow">›</span>
        </div>
      </div>

    </div><!-- /login-card -->

    <p class="login-note">SmartNest © 2025 · <span>Tutti i dati sono simulati</span></p>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isAuthenticated()) {
      window.location.href = 'index.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');
      const errorEl  = document.getElementById('form-error');
      const msgEl    = document.getElementById('error-msg');

      // Loading state
      btn.classList.add('loading');
      btn.textContent = 'Accesso in corso';
      btn.disabled = true;
      errorEl.classList.remove('visible');

      // Simulate network delay
      setTimeout(() => {
        const result = Auth.login(email, password);
        btn.classList.remove('loading');
        btn.disabled = false;
        btn.textContent = 'Accedi';

        if (result.success) {
          btn.textContent = '✓ Accesso effettuato';
          btn.style.background = '#30c878';
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 500);
        } else {
          msgEl.textContent = result.error;
          errorEl.classList.add('visible');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      }, 700);
    }

    function loginDemo(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = email.includes('giulia') ? 'viewer123' : 'admin123';
      document.getElementById('login-form').dispatchEvent(new Event('submit'));
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }
  </script>
</body>
</html>
